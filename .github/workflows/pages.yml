name: Deploy Stele Browser Studio to GitHub Pages

# Trigger manually or on push to main (if Pages is enabled for the repo).
# Tests must pass before the site is built and deployed.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "stele/**"
      - "site/**"
      - "tools/build_pyodide_site.py"
      - "examples/**"

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Run tests first ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest -q

  # ── Build static site ──────────────────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Pyodide static site
        run: python tools/build_pyodide_site.py --output-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
